<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Allergy Selection | Culinary Editorial</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed": "#141f07",
                        "surface-container-highest": "#e6e2dd",
                        "surface-container-lowest": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed-variant": "#3e4b2f",
                        "tertiary-container": "#974700",
                        "tertiary": "#733500",
                        "inverse-primary": "#ffb779",
                        "surface-bright": "#fdf9f4",
                        "secondary-container": "#d6e5bf",
                        "on-primary-container": "#ffcea7",
                        "on-tertiary-container": "#ffcdb0",
                        "on-surface-variant": "#534438",
                        "on-error-container": "#93000a",
                        "tertiary-fixed": "#ffdbc8",
                        "surface-container-high": "#ebe8e3",
                        "outline": "#857466",
                        "on-error": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "outline-variant": "#d8c3b3",
                        "on-secondary-container": "#5a6749",
                        "primary": "#6c3a00",
                        "inverse-on-surface": "#f4f0eb",
                        "surface-tint": "#8e4f04",
                        "background": "#fdf9f4",
                        "on-primary-fixed": "#2e1500",
                        "primary-fixed": "#ffdcc1",
                        "on-tertiary-fixed-variant": "#743500",
                        "primary-fixed-dim": "#ffb779",
                        "on-secondary": "#ffffff",
                        "secondary-fixed": "#d9e8c2",
                        "secondary": "#556345",
                        "secondary-fixed-dim": "#bdcca7",
                        "surface": "#fdf9f4",
                        "error": "#ba1a1a",
                        "on-primary-fixed-variant": "#6c3a00",
                        "on-surface": "#1c1c19",
                        "surface-variant": "#e6e2dd",
                        "tertiary-fixed-dim": "#ffb689",
                        "surface-container": "#f1ede8",
                        "on-primary": "#ffffff",
                        "inverse-surface": "#31302d",
                        "on-tertiary-fixed": "#311300",
                        "surface-container-low": "#f7f3ee",
                        "primary-container": "#8d4e03",
                        "surface-dim": "#ddd9d5",
                        "on-background": "#1c1c19"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .editorial-shadow {
            box-shadow: 0 12px 32px rgba(46, 21, 0, 0.06);
        }
        .signature-gradient {
            background: linear-gradient(135deg, #6c3a00 0%, #8d4e03 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#fdf9f4]/80 dark:bg-[#1c1c19]/80 backdrop-blur-md flex items-center justify-between px-6 py-4 w-full">
<button class="p-2 rounded-full hover:bg-[#f1ede8] dark:hover:bg-[#534438] transition-colors active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-[#6c3a00] dark:text-[#ffdcc1]">arrow_back</span>
</button>
<h1 class="font-plus-jakarta text-lg font-bold tracking-tight text-[#6c3a00] dark:text-[#ffdcc1]">Personalize Your Table</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="flex-grow pt-24 px-6 max-w-lg mx-auto w-full">
<!-- Hero Section -->
<div class="mb-10">
<h2 class="text-4xl font-extrabold tracking-tight text-on-background mb-4">Do you have any food allergies?</h2>
<p class="text-on-surface-variant text-lg">Select all that apply to help us curate your experience.</p>
</div>
<!-- Allergy Selection Grid -->
<div class="space-y-4 mb-12">
<!-- Special "None" Option (Asymmetric larger card) -->
<button class="w-full flex items-center justify-between p-6 bg-surface-container-low rounded-lg hover:bg-surface-container transition-colors group active:scale-[0.98] duration-200">
<div class="flex items-center gap-4">
<div class="w-12 h-12 bg-secondary-container rounded-full flex items-center justify-center text-on-secondary-container">
<span class="material-symbols-outlined">check_circle</span>
</div>
<span class="text-xl font-bold">None</span>
</div>
<div class="w-6 h-6 border-2 border-outline-variant rounded-full group-focus:border-primary flex items-center justify-center">
<div class="w-3 h-3 bg-primary rounded-full opacity-0 group-focus:opacity-100 transition-opacity"></div>
</div>
</button>
<!-- Multi-select Bento Grid -->
<div class="grid grid-cols-2 gap-4">
<!-- Dairy -->
<button class="flex flex-col items-start p-5 bg-surface-container rounded-lg hover:bg-surface-container-high transition-all active:scale-[0.98] text-left">
<span class="material-symbols-outlined text-primary mb-3">water_drop</span>
<span class="font-bold">Dairy</span>
</button>
<!-- Eggs -->
<button class="flex flex-col items-start p-5 bg-surface-container rounded-lg hover:bg-surface-container-high transition-all active:scale-[0.98] text-left">
<span class="material-symbols-outlined text-primary mb-3">egg</span>
<span class="font-bold">Eggs</span>
</button>
<!-- Peanuts -->
<button class="flex flex-col items-start p-5 bg-surface-container rounded-lg hover:bg-surface-container-high transition-all active:scale-[0.98] text-left">
<span class="material-symbols-outlined text-primary mb-3">nutrition</span>
<span class="font-bold">Peanuts</span>
</button>
<!-- Tree nuts -->
<button class="flex flex-col items-start p-5 bg-surface-container rounded-lg hover:bg-surface-container-high transition-all active:scale-[0.98] text-left">
<span class="material-symbols-outlined text-primary mb-3">forest</span>
<span class="font-bold">Tree nuts</span>
</button>
<!-- Gluten (Spans 2 columns for editorial rhythm) -->
<button class="col-span-2 flex items-center justify-between p-5 bg-surface-container rounded-lg hover:bg-surface-container-high transition-all active:scale-[0.98] text-left">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary">bakery_dining</span>
<span class="font-bold">Gluten</span>
</div>
<span class="text-on-surface-variant text-sm">Wheat, Rye, Barley</span>
</button>
<!-- Soy -->
<button class="flex flex-col items-start p-5 bg-surface-container rounded-lg hover:bg-surface-container-high transition-all active:scale-[0.98] text-left">
<span class="material-symbols-outlined text-primary mb-3">eco</span>
<span class="font-bold">Soy</span>
</button>
<!-- Seafood -->
<button class="flex flex-col items-start p-5 bg-surface-container rounded-lg hover:bg-surface-container-high transition-all active:scale-[0.98] text-left">
<span class="material-symbols-outlined text-primary mb-3">set_meal</span>
<span class="font-bold">Seafood</span>
</button>
<!-- Shellfish -->
<button class="flex flex-col items-start p-5 bg-surface-container rounded-lg hover:bg-surface-container-high transition-all active:scale-[0.98] text-left">
<span class="material-symbols-outlined text-primary mb-3">capture</span>
<span class="font-bold">Shellfish</span>
</button>
<!-- Sesame -->
<button class="flex flex-col items-start p-5 bg-surface-container rounded-lg hover:bg-surface-container-high transition-all active:scale-[0.98] text-left">
<span class="material-symbols-outlined text-primary mb-3">grain</span>
<span class="font-bold">Sesame</span>
</button>
<!-- Other -->
<button class="col-span-2 flex items-center gap-4 p-5 bg-surface-container-low border-2 border-dashed border-outline-variant/30 rounded-lg hover:bg-surface-container transition-all active:scale-[0.98] text-left">
<span class="material-symbols-outlined text-on-surface-variant">add_circle</span>
<span class="font-bold">Other</span>
</button>
</div>
</div>
<!-- Visual Anchor Image -->
<div class="relative w-full h-48 rounded-lg overflow-hidden mb-8 editorial-shadow">
<img alt="artisan kitchen counter" class="w-full h-full object-cover" data-alt="overhead view of fresh organic vegetables and grains on a rustic wooden table with soft morning light and earthy tones" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCRyT92Rye4NWMWqloNooJRM4lK4RqO-UH2wtKKGpeFfUfTCTA7CQSPOk7r--FSqedhP2_boJV1NSqf8ko9NlRobYM3kgPU7iZ7xQP1RanN02J2smmi_OYuvBbCCo5BEsxNhJccwh_jFdm2Oshe5xTYgKuv4MXroNo4tNK_1Pky580i4wIo-xQQlEDIZLS_SgJGc9BXSTRg8BHwOR9-Hse6fECanIN2WTAmP52HIZ5xcn1VjRcla-7MTNHQ2rWAe0sJ5svg7CDDY6WZ"/>
<div class="absolute inset-0 bg-gradient-to-t from-on-primary-fixed/40 to-transparent"></div>
<div class="absolute bottom-4 left-4 right-4">
<span class="text-surface-container-lowest font-medium text-sm">We take your safety seriously. Our AI filters over 5,000 recipes based on your profile.</span>
</div>
</div>
</main>
<!-- BottomNavBar (Onboarding Mode) -->
<footer class="fixed bottom-0 left-0 w-full flex justify-between items-center px-8 pb-8 pt-4 bg-[#fdf9f4] dark:bg-[#1c1c19] shadow-[0_-12px_32px_rgba(46,21,0,0.06)] rounded-t-[3rem] z-50">
<!-- Inactive Nav: Skip -->
<button class="flex flex-col items-center justify-center text-[#534438] dark:text-[#d8c3b3] px-6 py-3 hover:opacity-90 active:scale-98 transition-all duration-200">
<span class="material-symbols-outlined mb-1">close</span>
<span class="font-plus-jakarta text-xs font-medium uppercase tracking-widest">Skip</span>
</button>
<!-- Active Nav: Continue -->
<button class="flex flex-col items-center justify-center bg-[#ffdcc1] dark:bg-[#8d4e03] text-[#2e1500] dark:text-[#ffffff] rounded-full px-8 py-3 hover:opacity-90 active:scale-98 transition-all duration-200">
<span class="material-symbols-outlined mb-1">arrow_forward</span>
<span class="font-plus-jakarta text-xs font-medium uppercase tracking-widest">Continue</span>
</button>
</footer>
</body></html>
