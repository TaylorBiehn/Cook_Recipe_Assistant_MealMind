<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "background": "#fdf9f4",
                    "primary-container": "#8d4e03",
                    "surface-container-high": "#ebe8e3",
                    "surface-variant": "#e6e2dd",
                    "inverse-surface": "#31302d",
                    "on-primary": "#ffffff",
                    "primary": "#6c3a00",
                    "on-secondary-fixed": "#141f07",
                    "error-container": "#ffdad6",
                    "inverse-primary": "#ffb779",
                    "tertiary-fixed": "#ffdbc8",
                    "on-secondary-container": "#5a6749",
                    "on-primary-fixed": "#2e1500",
                    "surface-container-low": "#f7f3ee",
                    "primary-fixed": "#ffdcc1",
                    "surface-dim": "#ddd9d5",
                    "on-tertiary-fixed": "#311300",
                    "on-tertiary": "#ffffff",
                    "on-tertiary-fixed-variant": "#743500",
                    "surface-bright": "#fdf9f4",
                    "on-primary-container": "#ffcea7",
                    "inverse-on-surface": "#f4f0eb",
                    "on-secondary": "#ffffff",
                    "tertiary-fixed-dim": "#ffb689",
                    "tertiary": "#733500",
                    "primary-fixed-dim": "#ffb779",
                    "outline": "#857466",
                    "surface-container": "#f1ede8",
                    "on-background": "#1c1c19",
                    "secondary-container": "#d6e5bf",
                    "error": "#ba1a1a",
                    "tertiary-container": "#974700",
                    "surface-container-lowest": "#ffffff",
                    "on-primary-fixed-variant": "#6c3a00",
                    "surface-tint": "#8e4f04",
                    "on-error": "#ffffff",
                    "outline-variant": "#d8c3b3",
                    "on-tertiary-container": "#ffcdb0",
                    "on-surface": "#1c1c19",
                    "surface-container-highest": "#e6e2dd",
                    "secondary-fixed": "#d9e8c2",
                    "on-secondary-fixed-variant": "#3e4b2f",
                    "surface": "#fdf9f4",
                    "secondary-fixed-dim": "#bdcca7",
                    "on-error-container": "#93000a",
                    "secondary": "#556345",
                    "on-surface-variant": "#534438"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Plus Jakarta Sans"],
                    "label": ["Plus Jakarta Sans"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .gradient-primary {
            background: linear-gradient(135deg, #6c3a00 0%, #8d4e03 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#fdf9f4]/80 backdrop-blur-md flex items-center px-4 h-16 w-full">
<div class="flex items-center gap-4">
<button class="hover:bg-[#f1ede8] rounded-full p-2 active:scale-95 duration-200">
<span class="material-symbols-outlined text-[#6c3a00]">arrow_back</span>
</button>
<h1 class="font-headline text-lg font-semibold tracking-tight text-[#6c3a00]">Palate Profile</h1>
</div>
</header>
<main class="flex-1 pt-24 pb-32 px-6 max-w-md mx-auto w-full">
<!-- Editorial Hero Section -->
<section class="mb-10">
<h2 class="text-4xl font-extrabold tracking-tight text-on-background leading-tight mb-4">
                Do you prefer spicy food?
            </h2>
<p class="text-on-surface-variant text-lg leading-relaxed">
                Help us calibrate your palate for better recommendations.
            </p>
</section>
<!-- Selection List -->
<section class="space-y-4 mb-12">
<!-- Option 1 -->
<button class="w-full flex items-center justify-between p-6 bg-surface-container-low rounded-lg transition-transform active:scale-[0.98] group">
<span class="text-lg font-medium text-on-surface">Not at all</span>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary">radio_button_unchecked</span>
</button>
<!-- Option 2 -->
<button class="w-full flex items-center justify-between p-6 bg-surface-container-low rounded-lg transition-transform active:scale-[0.98] group">
<span class="text-lg font-medium text-on-surface">Mild</span>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary">radio_button_unchecked</span>
</button>
<!-- Option 3 (Active Example) -->
<button class="w-full flex items-center justify-between p-6 bg-primary-fixed text-on-primary-fixed rounded-lg transition-transform active:scale-[0.98]">
<span class="text-lg font-bold">Medium</span>
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<!-- Option 4 -->
<button class="w-full flex items-center justify-between p-6 bg-surface-container-low rounded-lg transition-transform active:scale-[0.98] group">
<span class="text-lg font-medium text-on-surface">Spicy</span>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary">radio_button_unchecked</span>
</button>
<!-- Option 5 -->
<button class="w-full flex items-center justify-between p-6 bg-surface-container-low rounded-lg transition-transform active:scale-[0.98] group">
<span class="text-lg font-medium text-on-surface">Very spicy</span>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary">radio_button_unchecked</span>
</button>
</section>
<!-- Chef's Note Section -->
<section class="relative mt-8 rounded-xl overflow-hidden bg-surface-container-highest p-1">
<div class="relative rounded-lg overflow-hidden h-48 mb-4">
<img alt="Spicy chili peppers" class="w-full h-full object-cover" data-alt="Close-up of vibrant red chili peppers and exotic spices on a rustic wooden table with moody editorial lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCqdXNdHPCbsQQd2UNjQWQPwUmpgCPy4sTDZ14KimJEu_EKtqtOGhNhAYbnQZjgf14JcJger1xjma_vY7ZiwaHBFPize02_mbLK7xDov49pyp-eL311L_nX4zVY391UTZormdo6wEzPH130wxSdVKhKMoHCZgkHZ0WT0-0WWBu8NWITK73oBNX1p5WrLl0DDEfIIllzJKFyo3ZPXhCXwx6D-IRm5m07843aKLaFTOGPlOisXj1o0BYfmTANKHaCOpeBvcgxg8jJ8ARo"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
<div class="absolute bottom-4 left-4 right-4">
<span class="inline-block px-3 py-1 bg-secondary-container text-on-secondary-container text-xs font-bold rounded-full mb-2">CHEF'S NOTE</span>
</div>
</div>
<div class="px-5 pb-6">
<p class="italic text-on-surface-variant font-medium leading-relaxed">
                    "Heat should never mask the flavor, it should dance with it. A perfect balance makes every ingredient sing."
                </p>
<p class="mt-2 text-sm font-bold text-primary">— Marcella Hazan</p>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-between items-center px-8 pb-8 pt-4 bg-[#fdf9f4] rounded-t-xl shadow-[0_-12px_32px_rgba(46,21,0,0.06)] z-50">
<!-- Skip Button -->
<button class="flex flex-col items-center justify-center text-[#534438] px-6 py-3 hover:opacity-90 active:scale-98 transition-transform">
<span class="material-symbols-outlined mb-1">close</span>
<span class="font-plus-jakarta text-sm font-medium">Skip</span>
</button>
<!-- Continue Button (Active State) -->
<button class="flex flex-col items-center justify-center bg-[#ffdcc1] text-[#2e1500] rounded-full px-8 py-3 hover:opacity-90 active:scale-98 transition-transform">
<span class="material-symbols-outlined mb-1">arrow_forward</span>
<span class="font-plus-jakarta text-sm font-medium">Continue</span>
</button>
</nav>
</body></html>
