<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding - Dietary Preferences</title>
<!-- Google Fonts: Epilogue (Editorial) & Plus Jakarta Sans (Functional) -->

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                    "on-primary-container": "#fffbff",
                    "secondary-fixed": "#c8f17a",

                    "primary-fixed-dim": "#ffb68c",
                    "primary-container": "#ae602d",
                    "outline-variant": "#ddc1b3",
                    "on-surface-variant": "#564338",

                    "surface-bright": "#fff8ef",

                    "headline": ["Epilogue"],
                    "body": ["Plus Jakarta Sans"],
                    "label": ["Plus Jakarta Sans"]

      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        h1, h2, h3 {
            font-family: 'Epilogue', serif;
        }
        .tonal-glass {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center overflow-x-hidden">
<!-- Top AppBar (from Shared Components) -->
<header class="fixed top-0 w-full z-50 bg-[#fff8ef]/80 dark:bg-stone-950/80 backdrop-blur-xl flex items-center justify-between px-6 h-16 w-full">
<button class="hover:opacity-80 transition-opacity active:scale-95 duration-200 text-[#904917] dark:text-[#ae602d]">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Epilogue'] font-bold text-lg tracking-tight text-[#904917]">Preferences</h1>
<div class="w-6"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-md px-6 pt-24 pb-32 flex flex-col">
<!-- Hero Section / Question Header -->
<div class="mb-10 text-center">
<div class="inline-block px-4 py-1 bg-secondary-container text-on-secondary-container rounded-full text-[10px] font-bold uppercase tracking-widest mb-4">
                Step 2 of 5
            </div>
<h2 class="text-3xl font-extrabold text-on-surface leading-tight mb-4 px-4">
                Do you follow a specific diet?
            </h2>
<p class="text-on-surface-variant text-sm px-8">
                We’ll tailor your recipe feed to match your nutritional needs and lifestyle.
            </p>
</div>
<!-- Options Container (Asymmetric / Bento inspired list) -->
<div class="space-y-3">
<!-- Option: No preference (Active State Example) -->
<button class="w-full flex items-center justify-between p-5 bg-gradient-to-r from-primary to-primary-container text-on-primary rounded-xl shadow-sm transition-all active:scale-[0.98]">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined" data-icon="restaurant">restaurant</span>
<span class="font-semibold text-lg">No preference</span>
</div>
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<!-- Option: Vegetarian -->
<button class="w-full flex items-center justify-between p-5 bg-surface-container-lowest text-on-surface rounded-xl hover:bg-surface-container-high transition-all active:scale-[0.98]">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-secondary" data-icon="potted_plant">potted_plant</span>
<span class="font-medium text-lg">Vegetarian</span>
</div>
<span class="w-6 h-6 rounded-full border-2 border-outline-variant"></span>
</button>
<!-- Option: Vegan -->
<button class="w-full flex items-center justify-between p-5 bg-surface-container-lowest text-on-surface rounded-xl hover:bg-surface-container-high transition-all active:scale-[0.98]">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-secondary" data-icon="eco">eco</span>
<span class="font-medium text-lg">Vegan</span>
</div>
<span class="w-6 h-6 rounded-full border-2 border-outline-variant"></span>
</button>
<!-- Grid Layout for shorter labels -->
<div class="grid grid-cols-2 gap-3">
<!-- Option: Keto -->
<button class="flex flex-col items-start p-5 bg-surface-container-lowest text-on-surface rounded-xl hover:bg-surface-container-high transition-all active:scale-[0.98]">
<span class="material-symbols-outlined text-primary mb-2" data-icon="bolt">bolt</span>
<span class="font-medium text-lg">Keto</span>
</button>
<!-- Option: Low carb -->
<button class="flex flex-col items-start p-5 bg-surface-container-lowest text-on-surface rounded-xl hover:bg-surface-container-high transition-all active:scale-[0.98]">
<span class="material-symbols-outlined text-primary mb-2" data-icon="keyboard_double_arrow_down">keyboard_double_arrow_down</span>
<span class="font-medium text-lg">Low carb</span>
</button>
</div>
<!-- Option: High protein -->
<button class="w-full flex items-center justify-between p-5 bg-surface-container-lowest text-on-surface rounded-xl hover:bg-surface-container-high transition-all active:scale-[0.98]">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary" data-icon="fitness_center">fitness_center</span>
<span class="font-medium text-lg">High protein</span>
</div>
<span class="w-6 h-6 rounded-full border-2 border-outline-variant"></span>
</button>
<div class="grid grid-cols-2 gap-3">
<!-- Option: Gluten free -->
<button class="flex flex-col items-start p-5 bg-surface-container-lowest text-on-surface rounded-xl hover:bg-surface-container-high transition-all active:scale-[0.98]">
<span class="material-symbols-outlined text-tertiary mb-2" data-icon="no_meals">no_meals</span>
<span class="font-medium text-lg leading-tight">Gluten free</span>
</button>
<!-- Option: Dairy free -->
<button class="flex flex-col items-start p-5 bg-surface-container-lowest text-on-surface rounded-xl hover:bg-surface-container-high transition-all active:scale-[0.98]">
<span class="material-symbols-outlined text-tertiary mb-2" data-icon="opacity">opacity</span>
<span class="font-medium text-lg leading-tight">Dairy free</span>
</button>
</div>
</div>
<!-- Visual Anchor: Food Imagery Context -->
<div class="mt-12 mb-8 relative rounded-2xl overflow-hidden h-40">
<img alt="vibrant mediterranean salad with fresh vegetables and herbs" class="w-full h-full object-cover grayscale-[20%] brightness-90" data-alt="top view of a vibrant mediterranean salad with fresh vegetables and herbs in a ceramic bowl on a warm linen background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAaciqWG6MapYRjR4I8Fvm_vKHli1rBYLj6pToj_VEcqRwhFzWithR995pvnHgm7zp7IyLOla89iUTDweZg_vjEnXC25RTM9-lEuDKDHKkUciWvHEdbMq1SXjOcJ0ii_4Saap3XTkfapltcDM8ONPkkfy-q584xqO-eaSSLpURJKdXaZyFQv-bl3WptI8N2pL6hdM6YpMbKDO7HZHTdi4Gh9c8-YHuNDbXkorxzAznUfJCHC0b7Qw9YWIVY1iFcXo_MRnF5I94xW8Tf"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface/80 to-transparent"></div>
<div class="absolute bottom-4 left-4 right-4 text-xs font-bold text-on-surface/60 italic">
                "Healthy eating is a way of life, not a temporary diet."
            </div>
</div>
</main>
<!-- Bottom Action Area (Glassmorphic Container) -->
<footer class="fixed bottom-0 w-full p-6 pb-10 bg-surface/40 backdrop-blur-md">
<div class="max-w-md mx-auto">
<button class="w-full py-5 bg-gradient-to-r from-primary to-primary-container text-on-primary rounded-full font-bold text-lg shadow-lg shadow-primary/20 hover:brightness-110 transition-all active:scale-95 duration-150">
                Continue
            </button>
<p class="text-center mt-4 text-xs text-on-surface-variant font-medium">
                You can always change this in your profile settings later.
            </p>
</div>
</footer>
<!-- Bottom Navigation Icons (Shared Component Mapping) -->
<div class="fixed bottom-0 left-0 w-full flex justify-between items-center pointer-events-none [&amp;&gt;*]:pointer-events-auto px-6 pb-10 z-[60]">
<button class="bg-[#f5edde] dark:bg-stone-800 text-[#1e1b13] rounded-full p-4 hover:brightness-110 transition-all active:scale-90 duration-150">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<button class="bg-gradient-to-r from-[#904917] to-[#ae602d] text-white rounded-full p-4 shadow-lg hover:brightness-110 transition-all active:scale-90 duration-150">
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</body></html>
